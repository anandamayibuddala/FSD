<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Registration Form Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 40px auto;
            max-width: 700px;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            background-color: #fff;
            border-collapse: collapse;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
        }

        td.label {
            font-weight: bold;
            width: 30%;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            resize: vertical;
        }

        .form-buttons {
            text-align: center;
            padding-top: 20px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            margin: 0 10px;
            cursor: pointer;
        }

        input[type="submit"] {
            background-color: #2980b9;
            color: white;
        }

        input[type="reset"] {
            background-color: #ccc;
        }

        input[type="submit"]:hover {
            background-color: #1f6690;
        }

        input[type="reset"]:hover {
            background-color: #999;
        }
    </style>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form action="#" method="post">
        <table>
            <tr>
                <td class="label">Full Name:</td>
                <td><input type="text" name="fullname" required /></td>
            </tr>
            <tr>
                <td class="label">Email:</td>
                <td><input type="text" name="email" required /></td>
            </tr>
            <tr>
                <td class="label">Password:</td>
                <td><input type="password" name="password" required /></td>
            </tr>
            <tr>
                <td class="label">Age:</td>
                <td><input type="number" name="age" min="10" max="100" required /></td>
            </tr>
            <tr>
                <td class="label">Date of Birth:</td>
                <td><input type="date" name="dob" required /></td>
            </tr>
            <tr>
                <td class="label">Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male" /> Male
                    <input type="radio" name="gender" value="female" /> Female
                    <input type="radio" name="gender" value="other" /> Other
                </td>
            </tr>
            <tr>
                <td class="label">Courses Interested:</td>
                <td>
                    <input type="checkbox" name="course" value="HTML" /> HTML
                    <input type="checkbox" name="course" value="CSS" /> CSS
                    <input type="checkbox" name="course" value="JavaScript" /> JavaScript
                    <input type="checkbox" name="course" value="Python" /> Python
                </td>
            </tr>
            <tr>
                <td class="label">Country:</td>
                <td>
                    <select name="country" required>
                        <option value="">-- Select Country --</option>
                        <option value="India">India</option>
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="label">Address:</td>
                <td>
                    <textarea name="address" rows="4" placeholder="Enter your full address"></textarea>
                </td>
            </tr>
        </table>

        <div class="form-buttons">
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
        </div>
    </form>

</body>
</html>
