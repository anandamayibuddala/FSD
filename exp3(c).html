<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Style Levels Example</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="style.css">

  <!-- Internal CSS -->
  <style>
    h2 {
      color: darkred;
      text-decoration: underline;
    }
    .internal-box {
      background-color: lightyellow;
      border: 2px solid orange;
      padding: 10px;
    }
  </style>
</head>
<body>

  <!-- External Style applied (from style.css) -->
  <h1>External CSS Example</h1>
  <p>This paragraph uses <strong>external stylesheet</strong> for font size and color.</p>

  <!-- Internal Style applied -->
  <h2>Internal CSS Example</h2>
  <div class="internal-box">
    This box uses <strong>internal CSS</strong> for background and border.
  </div>

  <!-- Inline Style applied -->
  <h3 style="color: purple; font-size: 22px;">Inline CSS Example</h3>
  <p style="color: brown; background-color: #f0e68c; padding: 5px;">
    This paragraph uses <strong>inline CSS</strong> for text color, background, and padding.
  </p>

</body>
</html>
