<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Links to Profiles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fafafa;
            text-align: center;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .profile-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .profile {
            text-align: center;
            max-width: 180px;
        }
        .profile img {
            width: 180px;  /* set your desired width */
            height: 180px; /* set your desired height */
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .profile img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .profile-name {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <h1>Profile Images with Links</h1>

    <div class="profile-container">

        <!-- Your profile -->
        <div class="profile">
            <a href="https://your-profile-url.com" target="_blank" rel="noopener noreferrer">
                <img src="https://via.placeholder.com/180" alt="Your Name" />
            </a>
            <div class="profile-name">Your Name</div>
        </div>

        <!-- Friend's profile -->
        <div class="profile">
            <a href="https://friends-profile-url.com" target="_blank" rel="noopener noreferrer">
                <img src="https://via.placeholder.com/180" alt="Friend's Name" />
            </a>
            <div class="profile-name">Friend's Name</div>
        </div>

    </div>

</body>
</html>
